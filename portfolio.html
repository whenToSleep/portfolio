<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anna Starostina — Illustrator's Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Source+Serif+4:opsz,wght,ital@8..60,300..900,0;8..60,300..900,1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper: #FFFFFE;
    --ink:   #0F0F0F;
    --rule:  #E5E5E5;
    --accent:#DD3624;
    --plate-bg: #efeae0;
    --plate-stripe: rgba(15,15,15,0.05);
    --plate-stripe-accent: rgba(221,54,36,0.07);
    --gutter: 24px;
    --col: minmax(0,1fr);
    --page-w: 1280px;
    --display: "Playfair Display", "Old Standard TT", Georgia, serif;
    --condensed: "Bricolage Grotesque", "GT America Condensed", "Helvetica Neue", sans-serif;
    --body: "Source Serif 4", "Söhne", Georgia, serif;
    --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
  }

  [data-theme="dark"] {
    --paper: #14110D;
    --ink:   #ECE6D9;
    --rule:  #2C2722;
    --plate-bg: #1d1a14;
    --plate-stripe: rgba(236,230,217,0.06);
    --plate-stripe-accent: rgba(232,80,62,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  html { transition: background-color 420ms ease; }
  body {
    transition: background-color 420ms ease, color 420ms ease;
    font-family: var(--body);
    font-size: 17px;
    line-height: 1.53;
    font-feature-settings: "liga", "dlig", "kern";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    hanging-punctuation: first last;
    overflow-x: hidden;
  }

  /* ---------- Layout primitives ---------- */
  .page {
    max-width: var(--page-w);
    margin: 0 auto;
    padding: 0 40px;
    position: relative;
  }
  .grid-12 {
    display: grid;
    grid-template-columns: repeat(12, var(--col));
    column-gap: var(--gutter);
  }

  /* Optional grid overlay */
  body.grid-on .page::before {
    content: "";
    position: absolute;
    inset: 0 40px;
    display: grid;
    grid-template-columns: repeat(12, var(--col));
    column-gap: var(--gutter);
    pointer-events: none;
    z-index: 9999;
  }
  body.grid-on .page::after {
    content: "";
    position: absolute;
    inset: 0 40px;
    background-image:
      repeating-linear-gradient(to right,
        transparent 0,
        transparent calc((100% - 11 * var(--gutter)) / 12),
        rgba(221, 54, 36, 0.06) calc((100% - 11 * var(--gutter)) / 12),
        rgba(221, 54, 36, 0.06) calc((100% - 11 * var(--gutter)) / 12 + var(--gutter)));
    pointer-events: none;
    z-index: 9998;
  }

  /* ---------- Type ---------- */
  .display {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 30, "wght" 400;
    font-weight: 400;
    letter-spacing: -0.015em;
    line-height: 0.95;
  }
  .display-italic {
    font-family: var(--display);
    font-style: italic;
    font-variation-settings: "opsz" 144, "SOFT" 30, "wght" 400;
  }
  .sub {
    font-family: var(--condensed);
    font-stretch: 75%;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .mono {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .body-serif { font-family: var(--body); }

  /* Editorial link — red underline grows left→right on hover */
  .e-link {
    color: inherit;
    text-decoration: none;
    background-image: linear-gradient(var(--accent), var(--accent));
    background-repeat: no-repeat;
    background-position: 0 100%;
    background-size: 0% 1px;
    transition: background-size 250ms ease, color 250ms ease;
    padding-bottom: 1px;
    cursor: pointer;
  }
  .e-link:hover { background-size: 100% 1px; }
  .e-link.is-active {
    background-size: 100% 1px;
    color: var(--accent);
  }

  /* ---------- Top masthead nav ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--paper);
    transition: transform 320ms ease, background-color 420ms ease, border-color 420ms ease;
    border-bottom: 1px solid var(--ink);
  }

  /* ---------- Lang / theme controls ---------- */
  .meta-controls {
    display: flex;
    align-items: baseline;
    gap: 12px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .meta-controls .ctrl-group { display: flex; align-items: baseline; gap: 6px; }
  .meta-controls .sep { opacity: 0.3; }
  .meta-controls .divider { opacity: 0.25; margin: 0 2px; }
  .meta-controls a { cursor: pointer; }
  .meta-controls a.on { color: var(--accent); }
  .meta-controls a:not(.on) { opacity: 0.55; }
  .meta-controls a:not(.on):hover { opacity: 1; }
  .topbar.hidden { transform: translateY(-100%); }
  .topbar-inner {
    max-width: var(--page-w);
    margin: 0 auto;
    padding: 14px 40px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
  }
  .topbar .brand {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 30, "wght" 500;
    font-size: 20px;
    letter-spacing: -0.01em;
    cursor: pointer;
  }
  .topbar .brand .em { font-style: italic; }
  .topbar nav {
    display: flex;
    gap: 28px;
  }
  .topbar nav .e-link {
    font-family: var(--condensed);
    font-stretch: 75%;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 12px;
    font-weight: 500;
  }
  .topbar .folio {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.7;
  }

  /* ---------- View Transitions / fade ---------- */
  .view {
    opacity: 1;
  }
  @media (prefers-reduced-motion: no-preference) {
    .view { animation: fadein 250ms ease; }
  }
  @keyframes fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  ::view-transition-old(root),
  ::view-transition-new(root) {
    animation-duration: 250ms;
  }

  /* ---------- Scroll-reveal (slide only — content never hidden by opacity) ---------- */
  .reveal { transform: none; }
  body.reveal-ready .reveal:not(.is-in) {
    transform: translateX(-12px);
    transition: transform 600ms ease;
  }
  body.reveal-ready .reveal.from-right:not(.is-in) {
    transform: translateX(12px);
  }
  body.reveal-ready .reveal.is-in {
    transform: translateX(0);
    transition: transform 600ms ease;
  }

  /* ---------- Placeholders for illustrations ---------- */
  .plate {
    position: relative;
    background-color: var(--plate-bg);
    background-image:
      repeating-linear-gradient(135deg,
        var(--plate-stripe) 0 1px,
        transparent 1px 8px);
    border: 1px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    overflow: hidden;
    transition: background-color 420ms ease, border-color 420ms ease;
  }
  .plate .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.7;
    text-align: center;
    padding: 0 12px;
  }
  .plate.v-2 {
    background-image: repeating-linear-gradient(45deg, var(--plate-stripe-accent) 0 1px, transparent 1px 10px);
  }
  .plate.v-3 {
    background-image: repeating-linear-gradient(90deg, var(--plate-stripe) 0 1px, transparent 1px 12px);
  }
  .plate.v-4 {
    background-image:
      repeating-linear-gradient(0deg, var(--plate-stripe) 0 1px, transparent 1px 14px),
      repeating-linear-gradient(90deg, var(--plate-stripe) 0 1px, transparent 1px 14px);
  }

  /* ---------- Rules ---------- */
  .hrule { border: 0; border-top: 1px solid var(--rule); margin: 0; }
  .hrule.ink { border-top: 1px solid var(--ink); }
  .hrule.thick { border-top: 2px solid var(--ink); }

  /* ---------- Hanging punctuation simulation for body ---------- */
  .article-body p {
    margin: 0 0 1.2em 0;
    font-family: var(--body);
    font-size: 17px;
    line-height: 1.62;
    text-indent: 1.5em;
  }
  .article-body p:first-of-type { text-indent: 0; }

  /* Drop cap */
  .dropcap::first-letter {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 30, "wght" 500;
    float: left;
    font-size: 5.8em;
    line-height: 0.85;
    padding: 0.08em 0.08em 0 0;
    margin-right: 0.04em;
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 820px) {
    .page { padding: 0 22px; }
    .topbar-inner { padding: 12px 22px; flex-wrap: wrap; gap: 12px; }
    .topbar nav { gap: 18px; }
  }
  @media (max-width: 600px) {
    .grid-12 { grid-template-columns: 1fr; }
    .display { font-size: 48px !important; }
    .hide-mobile { display: none; }
  }

  /* Tweaks panel host accommodations */
  .footer-imprint { padding: 80px 0 60px; }

  /* selection */
  ::selection { background: var(--accent); color: var(--paper); }

  /* ---------- Cinematic custom cursor ---------- */
  .cursor-dot {
    position: fixed;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    margin: -6px 0 0 -6px;
    border-radius: 50%;
    background: #E8E4DD;
    mix-blend-mode: difference;
    pointer-events: none;
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition:
      width 360ms cubic-bezier(0.22, 1, 0.36, 1),
      height 360ms cubic-bezier(0.22, 1, 0.36, 1),
      margin 360ms cubic-bezier(0.22, 1, 0.36, 1),
      opacity 240ms ease;
    will-change: transform;
  }
  .cursor-dot.is-visible { opacity: 1; }
  .cursor-dot::after {
    content: attr(data-label);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--paper);
    opacity: 0;
    transition: opacity 220ms ease;
    white-space: nowrap;
  }
  .cursor-dot.is-hover {
    width: 56px;
    height: 56px;
    margin: -28px 0 0 -28px;
  }
  .cursor-dot.is-hover::after { opacity: 1; }

  body.cursor-on,
  body.cursor-on a,
  body.cursor-on button,
  body.cursor-on [data-cursor] { cursor: none; }

  @media (hover: none), (max-width: 768px) {
    .cursor-dot { display: none !important; }
    a, button, [data-cursor] { cursor: pointer; }
  }
</style>
</head>

  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
  </script>

const { useState, useEffect, useRef, useMemo } = React;

function useReveal(dep) {
  useEffect(() => {
    const motionOK = !window.matchMedia || !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (motionOK) document.body.classList.add("reveal-ready");
    let timers = [];
    function check() {
      const vh = window.innerHeight || document.documentElement.clientHeight;
      const els = document.querySelectorAll(".reveal:not(.is-in)");
      els.forEach((el) => {
        const r = el.getBoundingClientRect();
        if (r.top < vh * 0.94 && r.bottom > -40) el.classList.add("is-in");
      });
    }
    // Multiple passes via setTimeout (fires even when rAF/IO are suppressed
    // in a backgrounded preview document).
    [0, 60, 160, 360].forEach((ms) => timers.push(setTimeout(check, ms)));
    window.addEventListener("scroll", check, { passive: true });
    window.addEventListener("resize", check, { passive: true });
    return () => {
      timers.forEach(clearTimeout);
      window.removeEventListener("scroll", check);
      window.removeEventListener("resize", check);
    };
  }, [dep]);
}

function Plate({ variant = 1, label = "", style, className = "" }) {
  return (

  );
}

  <script type="text/babel" data-source="app.jsx">
// App shell: top nav (auto-hide on scroll), theme + language toggles,
// page routing w/ work selection, fade transitions, Tweaks panel.

const { useState: useStateApp, useEffect: useEffectApp, useRef: useRefApp } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#DD3624",
  "headingFont": "\"Playfair Display\", \"Old Standard TT\", Georgia, serif",
  "showGrid": false
}/*EDITMODE-END*/;

const LS_THEME = "av_theme";
const LS_LANG = "av_lang";

function App() {
  const [page, setPage] = useStateApp("home");
  const [work, setWork] = useStateApp(WORKS[0]);
  const [hideBar, setHideBar] = useStateApp(false);
  const lastY = useRefApp(0);

  const [theme, setTheme] = useStateApp(() => {
    try { return localStorage.getItem(LS_THEME) || "light"; } catch (e) { return "light"; }
  });
  const [lang, setLang] = useStateApp(() => {
    try { return localStorage.getItem(LS_LANG) || "en"; } catch (e) { return "en"; }
  });

  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  // Theme → data-theme attribute + persistence
  useEffectApp(() => {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem(LS_THEME, theme); } catch (e) {}
  }, [theme]);

  // Language → <html lang> + persistence
  useEffectApp(() => {
    document.documentElement.setAttribute("lang", lang === "uk" ? "uk" : "en");
    try { localStorage.setItem(LS_LANG, lang); } catch (e) {}
  }, [lang]);

  // Tweaks → CSS vars
  useEffectApp(() => {
    document.documentElement.style.setProperty("--accent", tweaks.accent);
    document.documentElement.style.setProperty("--display", tweaks.headingFont);
    document.body.classList.toggle("grid-on", !!tweaks.showGrid);
  }, [tweaks]);

  // Hide bar on scroll down, show on scroll up
  useEffectApp(() => {
    function onScroll() {
      const y = window.scrollY;
      const dy = y - lastY.current;
      if (Math.abs(dy) < 6) return;
      if (dy > 0 && y > 120) setHideBar(true);
      else setHideBar(false);
      lastY.current = y;
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  function go(p, w) {
    if (w) setWork(w);
    const navigate = () => {
      setPage(p);
      window.scrollTo({ top: 0, behavior: "auto" });
    };
    if (p === page && !w) return;
    if (document.startViewTransition) document.startViewTransition(navigate);
    else navigate();
  }

  function switchTheme(next) {
    setTheme(next);
  }
  function switchLang(next) {
    setLang(next);
  }

  const t = STR[lang];

  let PageComponent = HomePage;
  if (page === "issue") PageComponent = IssuePage;
  else if (page === "project") PageComponent = ProjectPage;
  else if (page === "letter") PageComponent = LetterPage;
  else if (page === "masthead") PageComponent = MastheadPage;

  return (
    <React.Fragment>
      <header className={`topbar ${hideBar ? "hidden" : ""}`}>
        <div className="topbar-inner">
          <a className="brand" data-cursor="Home" onClick={() => go("home")}>
            {lang === "uk" ? <span>Анна <span className="em">Старостіна</span></span> : <span>Anna <span className="em">Starostina</span></span>}
            <span style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: "0.12em", marginLeft: 14, opacity: 0.6, textTransform: "uppercase" }}>
              {t.journal}
            </span>
          </a>

          <nav>
            {["home", "issue", "project", "letter", "masthead"].map((k) => (
              <a key={k} className={`e-link ${page === k ? "is-active" : ""}`} data-cursor="Open" onClick={() => go(k)}>
                {t.nav[k]}
              </a>
            ))}
          </nav>

          <div className="meta-controls">
            <span className="ctrl-group">
              <a className={lang === "en" ? "on" : ""} onClick={() => switchLang("en")}>EN</a>
              <span className="sep">·</span>
              <a className={lang === "uk" ? "on" : ""} onClick={() => switchLang("uk")}>UA</a>
            </span>
            <span className="divider">/</span>
            <span className="ctrl-group">
              <a className={theme === "light" ? "on" : ""} onClick={() => switchTheme("light")}>{t.dayNight.day}</a>
              <span className="sep">·</span>
              <a className={theme === "dark" ? "on" : ""} onClick={() => switchTheme("dark")}>{t.dayNight.night}</a>
            </span>
          </div>
        </div>
      </header>

      <main key={page + lang}>
        <PageComponent go={go} lang={lang} work={work} />
      </main>

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Reading">
          <window.TweakRadio
            label="Theme"
            value={theme}
            onChange={switchTheme}
            options={[{ value: "light", label: "Day" }, { value: "dark", label: "Night" }]}
          />
          <window.TweakRadio
            label="Language"
            value={lang}
            onChange={switchLang}
            options={[{ value: "en", label: "English" }, { value: "uk", label: "Українська" }]}
          />
        </window.TweakSection>

        <window.TweakSection title="Typography">
          <window.TweakSelect
            label="Headings"
            value={tweaks.headingFont}
            onChange={(v) => setTweak("headingFont", v)}
            options={[
              { value: '"Playfair Display", "Old Standard TT", Georgia, serif', label: "Playfair Display" },
              { value: '"EB Garamond", Georgia, serif', label: "EB Garamond" },
              { value: '"Old Standard TT", Georgia, serif', label: "Old Standard TT" },
            ]}
          />
        </window.TweakSection>

        <window.TweakSection title="Palette">
          <window.TweakColor
            label="Accent"
            value={tweaks.accent}
            onChange={(v) => setTweak("accent", v)}
            options={["#DD3624", "#0F0F0F", "#1B3A8B", "#0B6A3B"]}
          />
        </window.TweakSection>

        <window.TweakSection title="Layout">
          <window.TweakToggle
            label="Show 12-col grid"
            value={tweaks.showGrid}
            onChange={(v) => setTweak("showGrid", v)}
          />
        </window.TweakSection>

        <window.TweakSection title="Navigate">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            {["home", "issue", "project", "letter", "masthead"].map((k) => (
              <window.TweakButton key={k} onClick={() => go(k)}>{t.nav[k]}</window.TweakButton>
            ))}
          </div>
        </window.TweakSection>
      </window.TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
  // Cinematic custom cursor — vanilla JS, event-delegated so it works with React-rendered nodes.
  (function () {
    var fine = window.matchMedia("(hover: hover)").matches && window.matchMedia("(min-width: 769px)").matches;
    if (!fine) return;

    var dot = document.createElement("div");
    dot.className = "cursor-dot";
    document.body.appendChild(dot);
    document.body.classList.add("cursor-on");

    var tx = window.innerWidth / 2, ty = window.innerHeight / 2;
    var x = tx, y = ty, seen = false;

    window.addEventListener("mousemove", function (e) {
      tx = e.clientX; ty = e.clientY;
      if (!seen) { seen = true; x = tx; y = ty; dot.classList.add("is-visible"); }
    }, { passive: true });

    document.addEventListener("mouseleave", function () { dot.classList.remove("is-visible"); });
    document.addEventListener("mouseenter", function () { if (seen) dot.classList.add("is-visible"); });

    document.addEventListener("mouseover", function (e) {
      var hit = e.target.closest && e.target.closest("[data-cursor]");
      if (hit) {
        dot.setAttribute("data-label", hit.getAttribute("data-cursor") || "");
        dot.classList.add("is-hover");
      }
    });
    document.addEventListener("mouseout", function (e) {
      var hit = e.target.closest && e.target.closest("[data-cursor]");
      if (!hit) return;
      var to = e.relatedTarget && e.relatedTarget.closest ? e.relatedTarget.closest("[data-cursor]") : null;
      if (!to) dot.classList.remove("is-hover");
    });

    (function loop() {
      x += (tx - x) * 0.22;
      y += (ty - y) * 0.22;
      dot.style.transform = "translate(" + x + "px," + y + "px)";
      requestAnimationFrame(loop);
    })();
  })();
  </script>
